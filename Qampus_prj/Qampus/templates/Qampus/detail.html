<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
        <p</p>수정하기, 삭제하기 팝업형식으로 어떻게 하는지!!
    <h2>{{ post.title }}</h2><hr>
    <p>{{ post.content }}</p>




    {% for comment in comments %}
    <div>
        <p>익명 : {{ comment.content }} - {{ comment.created_at }}</p>

        <form method="POST" action="{% url 'Qampus:update_comment' comment.id %}">
            {% csrf_token %}
            <input type="text" name="content" value="{{ comment.content }}">
            <button type="submit">수정하기</button>
        </form>

        <form method="POST" action="{% url 'Qampus:delete_comment' comment.id %}">
            {% csrf_token %}
            <button type="submit">삭제하기</button>
        </form>
    </div>
{% empty %}
    <p>댓글이 없습니다.</p>
{% endfor %}
