name: Deploy (systemd-lite)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SSH pull & restart via systemd
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            # 1) 깃 저장소 루트에서 최신 코드
            cd ${{ secrets.REPO_DIR }}
            git fetch --all
            git reset --hard origin/main
            git pull origin main

            # 2) 장고 앱 폴더에서 migrate
            cd ${{ secrets.APP_DIR }}
            rm -rf myvenv
            if command -v python3.11 &> /dev/null; then
              python3.11 -m venv myvenv
            elif command -v python3.12 &> /dev/null; then
              python3.12 -m venv myvenv
            else
              python3 -m venv myvenv
            fi
            
            myvenv/bin/python -m pip install --upgrade pip setuptools wheel
            if [ -f requirements.txt ]; then myvenv/bin/pip install -r requirements.txt; fi
            myvenv/bin/python manage.py migrate --noinput

            # 3) 서비스 재시작
            sudo systemctl restart uwsgi
            sudo nginx -t && sudo systemctl reload nginx || true
